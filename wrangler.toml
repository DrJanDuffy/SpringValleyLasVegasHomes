# Cloudflare Workers — optional edge layer for this repo.
# Primary production is Vercel (www.springvalleylasvegashomes.com). If you use Cloudflare DNS
# with Vercel, keep the hostname DNS-only (gray cloud) to avoid SSL/proxy conflicts.
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "springvalleylasvegashomes-worker"
main = "workers/_worker.ts"
compatibility_date = "2026-02-13"
compatibility_flags = ["nodejs_compat"]

# Set in Cloudflare dashboard or `wrangler secret` — do not commit secrets.
account_id = ""
workers_dev = true

[vars]
DEBUG = "false"

[dev]
port = 8787
local_protocol = "http"

# Production — replace zone_name / pattern with your Cloudflare zone when Workers are enabled.
[env.production]
name = "springvalleylasvegashomes-worker-production"
vars = { DEBUG = "false" }

# Staging — optional
[env.staging]
name = "springvalleylasvegashomes-worker-staging"
vars = { DEBUG = "true" }

[observability]
enabled = true
head_sampling_rate = 1

[limits]
cpu_ms = 50
